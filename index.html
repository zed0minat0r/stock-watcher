<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPulse — Market Dashboard</title>
  <meta name="description" content="Real-time stock market dashboard with charts, watchlist, and display mode.">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js" defer></script>
</head>
<body>
  <a href="#stock-grid" class="skip-to-content">Skip to content</a>
  <!-- Header -->
  <header id="app-header">
    <div class="header-row">
      <div class="header-left">
        <h1 class="logo"><span class="logo-icon">&#9670;</span> <span class="logo-text">StockPulse</span></h1>
        <span class="market-status" id="market-status"></span>
      </div>
      <div class="header-right">
        <span class="last-updated" id="last-updated"></span>
        <button id="search-toggle-btn" class="icon-btn" title="Search" aria-label="Toggle search">&#128269;</button>
        <button id="refresh-btn" class="icon-btn" title="Refresh data">&#8635;</button>
        <button id="display-mode-btn" class="icon-btn" title="Display mode (fullscreen)">&#9974;</button>
      </div>
    </div>
    <div class="header-search" id="header-search">
      <form id="search-form" autocomplete="off">
        <input type="text" id="search-input" placeholder="Add ticker (e.g. AAPL)" maxlength="10" aria-label="Search for a stock ticker" role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="search-autocomplete" aria-activedescendant="">
        <button type="submit" id="search-btn">+ Add</button>
        <div class="search-autocomplete" id="search-autocomplete" role="listbox" aria-label="Stock search results"></div>
      </form>
    </div>
  </header>

  <!-- Market Summary Ticker Tape -->
  <div class="ticker-tape-wrapper" id="ticker-tape-wrapper" aria-label="Market indices ticker tape">
    <div class="ticker-tape" id="ticker-tape"></div>
  </div>

  <!-- Main dashboard -->
  <main id="dashboard">
    <div id="portfolio-summary" class="portfolio-summary" aria-live="polite"></div>
    <div id="dashboard-toolbar" class="dashboard-toolbar">
      <span class="toolbar-label">Sort by</span>
      <div class="sort-btns" role="radiogroup" aria-label="Sort stocks by">
        <button class="sort-btn active" data-sort="default" role="radio" aria-checked="true">Default</button>
        <button class="sort-btn" data-sort="change-desc" role="radio" aria-checked="false">Top Gainers</button>
        <button class="sort-btn" data-sort="change-asc" role="radio" aria-checked="false">Top Losers</button>
        <button class="sort-btn" data-sort="price-desc" role="radio" aria-checked="false">Price ↓</button>
        <button class="sort-btn" data-sort="alpha" role="radio" aria-checked="false">A–Z</button>
      </div>
    </div>
    <div id="stock-grid" class="stock-grid" aria-live="polite" aria-relevant="additions removals"></div>
  </main>

  <!-- Detail chart modal -->
  <div id="chart-modal" class="modal hidden" role="dialog" aria-label="Stock detail">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">
          <h2 id="modal-ticker"></h2>
          <span id="modal-company"></span>
        </div>
        <button id="modal-close" class="modal-close-btn" aria-label="Close">&times;</button>
      </div>
      <div id="modal-metrics" class="modal-metrics"></div>
      <div id="chart-timerange" class="chart-timerange" role="radiogroup" aria-label="Chart time range">
        <button class="tr-btn" data-days="5" role="radio" aria-checked="false">1W</button>
        <button class="tr-btn" data-days="30" role="radio" aria-checked="false">1M</button>
        <button class="tr-btn active" data-days="90" role="radio" aria-checked="true">3M</button>
        <button class="tr-btn" data-days="180" role="radio" aria-checked="false">6M</button>
        <button class="tr-btn" data-days="365" role="radio" aria-checked="false">1Y</button>
      </div>
      <div id="chart-wrap" style="position:relative;">
        <div id="chart-container"></div>
        <div id="chart-tooltip" class="chart-tooltip" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <!-- Display mode overlay -->
  <div id="display-overlay" class="display-overlay hidden">
    <div class="display-header">
      <h1 class="logo"><span class="logo-icon">&#9670;</span> <span class="logo-text">StockPulse</span></h1>
      <div class="display-controls">
        <span class="market-status" id="display-market-status"></span>
        <span id="display-clock"></span>
        <button id="exit-display-btn">&#10005; Exit</button>
      </div>
    </div>
    <div id="display-grid" class="display-grid"></div>
    <div class="display-footer">
      <div id="display-pagination" class="display-pagination" style="display:none;">
        <button class="display-page-btn" id="display-prev-btn" aria-label="Previous page">&larr; Prev</button>
        <span class="display-page-label" id="display-page-label"></span>
        <button class="display-page-btn" id="display-next-btn" aria-label="Next page">Next &rarr;</button>
      </div>
      <span id="display-rotate-label">Auto-rotating every 10s</span>
      <span class="display-kbd-hint" aria-hidden="true">&#8592; &#8594; to navigate</span>
      <div id="display-dots" class="display-dots"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
